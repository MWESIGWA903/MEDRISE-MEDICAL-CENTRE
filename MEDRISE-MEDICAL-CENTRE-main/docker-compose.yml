version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: medrise
      POSTGRES_PASSWORD: medrise
      POSTGRES_DB: medrise
    ports:
      - "5432:5432"
    volumes:
      - medrise_db:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@medrise.local
      PGADMIN_DEFAULT_PASSWORD: medrise
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  medrise_db:
