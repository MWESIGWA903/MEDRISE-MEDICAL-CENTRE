services:
  - type: web
    name: medrise-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./MEDRISE-MEDICAL-CENTRE-main/artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: medrise-db
          property: connectionString
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false

databases:
  - name: medrise-db
    plan: free
    region: oregon
